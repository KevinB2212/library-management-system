<!-- books/templates/books/books_by_category.html -->
{% extends 'base.html' %}

{% block content %}
  <h2>Books in Category: {{ category }}</h2>

  {% for book in books %}
    <div>
      <h3>{{ book.title }}</h3>
      <p>Author: {{ book.author }}</p>
      <p>Published Date: {{ book.published_date }}</p>
      <p>Category: {{ book.category }}</p>
    </div>
  {% endfor %}
{% endblock %}
