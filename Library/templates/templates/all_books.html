{% extends 'base.html' %}

{% block title %}
  All Books
{% endblock %}

{% block content %}
  <div class="container">
    <h2>All Books</h2>
    <div class="row">
      {% for book in books %}
        <div class="col-md-4">
          <div class="card mb-4">
            <div class="card-body">
              <h5 class="card-title">{{ book.title }}</h5>
              <p class="card-text">Author: {{ book.author }}</p>
              <p class="card-text">Year: {{ book.year }}</p>
              <p class="card-text">Price: ${{ book.price }}</p>
              <p class="card-text">Synopsis: {{ book.synopsis }}</p>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
