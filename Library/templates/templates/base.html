<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Other head elements -->
    <!-- Bootstrap or other CSS framework links go here -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Home</a>

            <!-- Add a dropdown for selecting a specific year -->
            <div class="navbar-nav">
                <a class="nav-item nav-link" href="{% url 'books_by_category' category='horror' %}">Horror</a>
                <a class="nav-item nav-link" href="{% url 'books_by_category' category='scifi' %}">Sci-Fi</a>
                <!-- Add more categories as needed -->
            </div>
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="yearDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    Select Year
                </button>
                <ul class="dropdown-menu" aria-labelledby="yearDropdown">
                    {% for year in years_range %}
                        <li><a class="dropdown-item" href="{% url 'books_in_year' year %}">{{ year }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Content block for individual pages to fill in -->
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap or other JS framework scripts go here -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-c3qBdKW5I5sJ7ds5uZ5tdtwjXn0DlUb0TStF9R7OpCpF8ZcZqcjUA7C3mi1X8BiC" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8sh+WyM6Wd8dQ5zYbSSUnQlmh/jM2C5YUdI1iS" crossorigin="anonymous"></script>
</body>
</html>
